<!DOCTYPE html><html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TikTok Chat Viewer</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white min-h-screen flex flex-col">  <!-- Header -->  <header class="p-4 border-b border-gray-800 flex items-center justify-between">
    <h1 class="text-xl font-bold">TikTok Chat Viewer</h1>
    <div class="flex gap-2">
      <input id="fileInput" type="file" accept=".json" class="text-sm" />
      <button id="scrollTopBtn" class="bg-pink-600 hover:bg-pink-500 px-3 py-1 rounded-xl text-sm">⏫ Début</button>
    </div>
  </header>  <!-- Chat container -->  <main id="chatContainer" class="flex-1 overflow-y-auto p-4 space-y-2"></main>  <!-- Template message -->  <template id="messageTemplate">
    <div class="w-full flex">
      <div class="bubble max-w-[75%] px-4 py-2 rounded-2xl text-sm"></div>
    </div>
  </template>  <script>
    const fileInput = document.getElementById('fileInput');
    const chatContainer = document.getElementById('chatContainer');
    const template = document.getElementById('messageTemplate');
    const scrollTopBtn = document.getElementById('scrollTopBtn');

    let currentUser = null;

    fileInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const text = await file.text();
      let data;

      try {
        data = JSON.parse(text);
      } catch (err) {
        alert('JSON invalide');
        return;
      }

      const messages =
        data?.['Direct Message']?.['Direct Messages']?.['ChatHistory'] || [];

      chatContainer.innerHTML = '';

      if (!messages.length) {
        chatContainer.innerHTML = '<p class="text-gray-400">Aucun message trouvé.</p>';
        return;
      }

      // détecte l'utilisateur principal (premier message)
      currentUser = messages[0]?.Sender;

      messages.forEach((msg) => {
        if (!msg.Content) return;

        const node = template.content.cloneNode(true);
        const wrapper = node.querySelector('div');
        const bubble = node.querySelector('.bubble');

        const isMe = msg.Sender === currentUser;

        wrapper.classList.add(isMe ? 'justify-end' : 'justify-start');

        bubble.textContent = msg.Content;
        bubble.classList.add(
          isMe
            ? 'bg-pink-600 rounded-br-md'
            : 'bg-gray-800 rounded-bl-md'
        );

        chatContainer.appendChild(node);
      });

      // scroll en bas auto
      chatContainer.scrollTop = chatContainer.scrollHeight;
    });

    scrollTopBtn.addEventListener('click', () => {
      chatContainer.scrollTo({ top: 0, behavior: 'smooth' });
    });
  </script></body>
</html>
